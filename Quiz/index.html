<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Helper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>Quiz Helper ✨</h1>
        <p style="color: #6b7280; font-size: 14px; margin-bottom: 24px;">Enter any topic to get a fun quiz question!</p>
        
        <div class="input-group">
            <span class="input-icon">🔍</span>
            <input id="input" placeholder="Type a topic like 'Python programming'...">
        </div>
        
        <button id="btn">
            <span>Get Quiz Question</span>
        </button>
        
        <div id="result">Enter a topic and click the button to get started! 🎯</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
