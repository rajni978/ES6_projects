<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌦 Weather App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌦 Weather App</h1>
        <p class="subtitle">Get real-time weather for any city worldwide</p>
        
        <div class="search-box">
            <input type="text" id="city" placeholder="Enter city name (e.g. London, Tokyo, New York)...">
            <button id="searchBtn">Get Weather</button>
        </div>

        <div id="loading">
            <div class="loading-spinner"></div>
            <p>Finding weather for your city...</p>
        </div>

        <div id="weatherBox" class="weather-stats">
            <div id="weatherIcon" class="weather-icon">🌤️</div>
            <h2 id="cityName"></h2>
            <h3 id="temp"></h3>
            <p id="desc"></p>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">💧</div>
                    <div class="stat-value" id="humidity">-</div>
                    <div class="stat-label">Humidity</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💨</div>
                    <div class="stat-value" id="wind">-</div>
                    <div class="stat-label">Wind</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🌡️</div>
                    <div class="stat-value" id="feelsLike">-</div>
                    <div class="stat-label">Feels Like</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">☀️</div>
                    <div class="stat-value" id="uvIndex">-</div>
                    <div class="stat-label">UV Index</div>
                </div>
            </div>
        </div>

        <div id="error" class="error" style="display: none;">
            <p>❌ Could not find weather for that city. Please try again!</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
